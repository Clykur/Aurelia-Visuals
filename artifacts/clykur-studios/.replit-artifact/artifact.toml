kind = "web"
previewPath = "/"
title = "Aurelia Visuals"
version = "1.0.0"
id = "artifacts/clykur-studios"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25677

[services.development]
run = "pnpm --filter @workspace/clykur-studios run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/clykur-studios", "run", "build" ]
publicDir = "artifacts/clykur-studios/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25677"
BASE_PATH = "/"
